name: Feature request
description: Propose a focused, safety-aware improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the user-visible behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and compatibility
      description: Note privileged operations, rollback needs, protocol/core compatibility, and migration impact.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
