name: Publish GitHub release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Required quality gates
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Build and publish
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify tag and package versions agree
        run: >-
          python -c 'import os, pathlib, tomllib; from packaging.version import Version;
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"];
          tag = os.environ["GITHUB_REF_NAME"];
          assert tag.startswith("v") and Version(tag[1:]) == Version(version),
          f"tag {tag!r} does not match package version {version!r}"'

      - name: Build release distributions
        run: |
          python -m build
          python -m twine check dist/*
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sing-box-manager-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: "dist/*"

      - name: Create immutable-tag GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          --title "${GITHUB_REF_NAME}"
