name: Python quality and package

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy src

      - name: Build and inspect distributions
        if: matrix.python-version == '3.14'
        run: |
          python -m build
          python -m twine check dist/*

      - name: Smoke-test the built wheel
        if: matrix.python-version == '3.14'
        run: |
          python -m venv .package-smoke
          .package-smoke/bin/python -m pip install dist/*.whl
          .package-smoke/bin/sb-manager --help
          .package-smoke/bin/sb-manager-install --help
          .package-smoke/bin/sb-manager-install-policy --help
          .package-smoke/bin/python -c "import sb_manager.privileged_cli"
